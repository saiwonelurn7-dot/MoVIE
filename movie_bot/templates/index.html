<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie List</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0d0d0d; color: #fff; padding: 20px; margin: 0; }
        .container { max-width: 1200px; margin: auto; }
        h1 { text-align: center; color: #ffcc00; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #1a1a1a; border-radius: 10px; overflow: hidden; transition: transform 0.3s; border: 1px solid #333; }
        .card:hover { transform: scale(1.03); }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .card-body { padding: 15px; }
        .card-title { font-size: 18px; font-weight: bold; margin-bottom: 5px; color: #ffcc00; }
        .card-desc { font-size: 14px; color: #aaa; }
        .card-link { display: inline-block; margin-top: 10px; background: #ffcc00; color: #000; padding: 8px 16px; border-radius: 5px; text-decoration: none; font-weight: bold; }
        .date { font-size: 12px; color: #666; margin-top: 10px; display: block; }
        .empty { text-align: center; color: #666; font-size: 20px; padding: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Movie Collection</h1>
        <div class="grid">
            {% if movies %}
                {% for movie in movies %}
                <div class="card">
                    <!-- movie[3] က poster_file_path ဖြစ်မယ် -->
                    <img src="https://api.telegram.org/file/bot{{ BOT_TOKEN }}/{{ movie[3] }}" alt="{{ movie[1] }}">
                    <div class="card-body">
                        <div class="card-title">{{ movie[1] }}</div>
                        <div class="card-desc">{{ movie[2][:100] }}...</div>
                        <a href="/movie/{{ movie[0] }}" class="card-link">📄 View Detail</a>
                        <span class="date">📅 {{ movie[4] }}</span>
                    </div>
                </div>
                {% endfor %}
            {% else %}
                <div class="empty">🎞️ ရုပ်ရှင်မရှိသေးပါ။ Bot မှ /add နှိပ်ပြီး တင်ပါ။</div>
            {% endif %}
        </div>
    </div>
</body>
</html>
